<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central Data Agency — ADMIN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #080b09;
      --bg2:       #0e1310;
      --border:    #1e2820;
      --green:     #4afe8a;
      --green-dim: #2a9454;
      --text:      #d4e0d6;
      --text-dim:  #6a8070;
      --red:       #fe4a6a;
      --red-dim:   #9a1a30;
      --red-faint: #2a0810;
      --mono:      'IBM Plex Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 13px; }

    body {
      font-family: var(--mono);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Admin banner ───────────────────────────────────── */
    #admin-banner {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 99999;
      background: var(--red-faint);
      border-bottom: 2px solid var(--red);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 20px;
      height: 36px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--red);
      outline: 2px solid var(--red-dim);
      outline-offset: -4px;
    }

    #admin-banner::before {
      content: '⚠';
      font-size: 13px;
      animation: blink 1.6s step-end infinite;
    }

    #admin-banner-label { font-weight: 600; }

    #admin-banner-sub {
      color: var(--red-dim);
      font-size: 9px;
    }

    #admin-banner-back {
      margin-left: auto;
      color: var(--red-dim);
      text-decoration: none;
      border: 1px solid var(--red-dim);
      padding: 2px 10px;
      border-radius: 2px;
      font-size: 9px;
      letter-spacing: 0.15em;
      transition: color 0.1s, border-color 0.1s;
    }
    #admin-banner-back:hover { color: var(--red); border-color: var(--red); }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    /* ── Push CMS content below banner ─────────────────── */
    #nc-root { padding-top: 36px; }

    /* Red side borders on CMS container */
    #nc-root > * {
      border-left: 3px solid var(--red-dim);
      border-right: 3px solid var(--red-dim);
    }
  </style>
  <!-- Decap CMS loaded from CDN — no build step required -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js" defer></script>
</head>
<body>

  <div id="admin-banner">
    <span id="admin-banner-label">Admin Mode</span>
    <span id="admin-banner-sub">Central Data Agency · Entity Registry CMS</span>
    <a id="admin-banner-back" href="../">← Registry</a>
  </div>

  <div id="nc-root"></div>
  <script>
    // Inject dark theme after Decap CMS renders (styled-components ignores static CSS)
    (function () {
      const BG   = '#080b09', BG2  = '#0e1310', BG3  = '#141a16';
      const TEXT = '#d4e0d6', DIM  = '#6a8070', FAINT= '#3a5040';
      const BORDER = '#1e2820', BORDER2 = '#2a3830';
      const RED  = '#fe4a6a', RED_DIM = '#9a1a30', RED_FAINT = '#2a0810';
      const GREEN = '#4afe8a', GREEN_DIM = '#2a9454', GREEN_FAINT = '#1a4a2a';

      const css = `
        /* Base */
        #nc-root { color-scheme: dark; }
        #nc-root, #nc-root > div, #nc-root > div > div { background: ${BG} !important; color: ${TEXT} !important; }

        /* Header — push below our fixed admin banner */
        [class*="AppHeader"] { background: ${BG2} !important; border-bottom: 1px solid ${BORDER} !important; box-shadow: none !important; position: sticky !important; top: 36px !important; z-index: 1000 !important; }
        [class*="AppHeaderContent"], [class*="AppHeaderNav"] ul, [class*="AppHeaderNavList"] { background: ${BG2} !important; }
        [class*="AppHeaderButton"], [class*="AppHeaderNavLink"] { color: ${DIM} !important; background: transparent !important; }
        [class*="buttonActive"], [class*="header-link-active"] { background: ${RED_FAINT} !important; color: ${RED} !important; }
        [class*="IconWrapper"] svg path { fill: ${DIM} !important; }

        /* Layout containers */
        [class*="AppMainContainer"], [class*="CollectionContainer"] { background: ${BG} !important; }

        /* Sidebar */
        [class*="SidebarContainer"], aside { background: ${BG2} !important; border-right: 1px solid ${BORDER} !important; box-shadow: none !important; }
        [class*="SidebarHeading"] { color: ${DIM} !important; border-bottom: 1px solid ${BORDER} !important; background: ${BG2} !important; }
        [class*="SearchContainer"] { background: ${BG2} !important; border-bottom: 1px solid ${BORDER} !important; }
        [class*="InputContainer"] { background: ${BG3} !important; border: 1px solid ${BORDER2} !important; border-radius: 2px !important; }
        [class*="InputContainer"] input { background: transparent !important; color: ${TEXT} !important; font-family: 'IBM Plex Mono', monospace !important; }

        /* Entry list */
        [class*="EntryListingGrid"], [class*="EntryListing"], [class*="EntryListingCards"] { background: ${BG} !important; }
        [class*="card-card"], [class*="EntryCard"], [class*="EntryListingCard"] { background: ${BG2} !important; border-color: ${BORDER} !important; color: ${TEXT} !important; }
        [class*="card-card"]:hover, [class*="EntryCard"]:hover { background: ${BG3} !important; border-color: ${BORDER2} !important; }

        /* Editor panels */
        [class*="EditorInterface"], [class*="EntryEditor"], [class*="EditorContainer"],
        [class*="ControlPane"], [class*="EditorControlPane"] { background: ${BG} !important; }
        [class*="EditorToolbar"], [class*="ToolbarContainer"] { background: ${BG2} !important; border-bottom: 1px solid ${BORDER} !important; box-shadow: none !important; }
        [class*="WidgetPreviewContainer"] { background: ${BG} !important; }

        /* Form controls */
        #nc-root input, #nc-root textarea, #nc-root select {
          background: ${BG3} !important; color: ${TEXT} !important;
          border-color: ${BORDER2} !important; font-family: 'IBM Plex Mono', monospace !important;
        }
        #nc-root input:focus, #nc-root textarea:focus { border-color: ${GREEN_DIM} !important; outline: none !important; }
        #nc-root label, #nc-root [class*="ControlLabel"], [class*="LabelComponent"] { color: ${DIM} !important; font-family: 'IBM Plex Mono', monospace !important; }
        [class*="ControlHint"], [class*="hint"] { color: ${FAINT} !important; }

        /* Buttons */
        #nc-root button { font-family: 'IBM Plex Mono', monospace !important; }
        [class*="CancelButton"] { background: transparent !important; border-color: ${BORDER2} !important; color: ${DIM} !important; }
        [class*="SaveButton"], [class*="PublishButton"] { background: ${GREEN_FAINT} !important; border-color: ${GREEN_DIM} !important; color: ${GREEN} !important; }

        /* Dropdowns & modals */
        [class*="DropdownList"], [class*="AvatarDropdown"], [class*="DropdownItem"] { background: ${BG2} !important; border: 1px solid ${BORDER} !important; color: ${TEXT} !important; }
        [class*="DropdownItem"]:hover { background: ${BG3} !important; }
        [class*="AuthenticationPage"] { background: ${BG} !important; }
        [class*="StyledWrapper"] { background: transparent !important; }

        /* Links */
        #nc-root a { color: ${GREEN_DIM} !important; }
        #nc-root a[aria-current], #nc-root a[class*="Active"] { color: ${RED} !important; }

        /* List widget items (entry fields) */
        [class*="ListItem"], [class*="SortableListItem"] { background: ${BG2} !important; border-color: ${BORDER} !important; }
        [class*="ListItemTopBar"], [class*="ObjectWidgetTopBar"] { background: ${BG3} !important; border-bottom: 1px solid ${BORDER} !important; }
        [class*="AddButton"], [class*="ListItemAdd"] { color: ${GREEN_DIM} !important; border-color: ${GREEN_FAINT} !important; }
      `;

      function inject() {
        if (document.getElementById('cda-dark')) return;
        const root = document.querySelector('#nc-root > div');
        if (!root) return;
        const s = document.createElement('style');
        s.id = 'cda-dark';
        s.textContent = css;
        document.head.appendChild(s);
      }

      // Run once Decap CMS mounts, then keep watching for route changes
      const obs = new MutationObserver(inject);
      obs.observe(document.getElementById('nc-root'), { childList: true, subtree: true });
    })();
  </script>
</body>
</html>
