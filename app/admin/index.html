<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central Data Agency — ADMIN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #080b09;
      --bg2:       #0e1310;
      --border:    #1e2820;
      --green:     #4afe8a;
      --green-dim: #2a9454;
      --text:      #d4e0d6;
      --text-dim:  #6a8070;
      --red:       #fe4a6a;
      --red-dim:   #9a1a30;
      --red-faint: #2a0810;
      --mono:      'IBM Plex Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 13px; }

    body {
      font-family: var(--mono);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Admin banner ───────────────────────────────────── */
    #admin-banner {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 99999;
      background: var(--red-faint);
      border-bottom: 2px solid var(--red);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 20px;
      height: 36px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--red);
      outline: 2px solid var(--red-dim);
      outline-offset: -4px;
    }

    #admin-banner::before {
      content: '⚠';
      font-size: 13px;
      animation: blink 1.6s step-end infinite;
    }

    #admin-banner-label { font-weight: 600; }

    #admin-banner-sub {
      color: var(--red-dim);
      font-size: 9px;
    }

    #admin-banner-back {
      margin-left: auto;
      color: var(--red-dim);
      text-decoration: none;
      border: 1px solid var(--red-dim);
      padding: 2px 10px;
      border-radius: 2px;
      font-size: 9px;
      letter-spacing: 0.15em;
      transition: color 0.1s, border-color 0.1s;
    }
    #admin-banner-back:hover { color: var(--red); border-color: var(--red); }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    /* ── Push CMS content below banner ─────────────────── */
    #nc-root { padding-top: 36px; }

    /* ── Override Decap CMS chrome ──────────────────────── */
    /* Using actual class name fragments from rendered HTML  */

    /* Header bar — css-*-AppHeader-* */
    [class*="AppHeader"] {
      background: var(--bg2) !important;
      border-bottom: 1px solid var(--border) !important;
      box-shadow: none !important;
    }
    /* Nav links in header */
    [class*="AppHeaderNav"],
    [class*="AppHeaderButton"],
    [class*="AppHeaderLink"] {
      color: var(--text-dim) !important;
    }
    /* Active nav item */
    [class*="buttonActive"] {
      background: var(--red-faint) !important;
      color: var(--red) !important;
    }

    /* Main layout wrapper — css-*-AppMainContainer-* */
    [class*="AppMainContainer"] {
      background: var(--bg) !important;
    }

    /* Collection list page wrapper — css-*-CollectionContainer-* */
    [class*="CollectionContainer"] {
      background: var(--bg) !important;
    }

    /* Sidebar — css-*-SidebarContainer-* */
    [class*="SidebarContainer"] {
      background: var(--bg2) !important;
      border-right: 1px solid var(--border) !important;
    }
    [class*="SidebarHeading"] {
      color: var(--text-dim) !important;
      border-bottom-color: var(--border) !important;
    }

    /* Search — css-*-SearchContainer-* / InputContainer */
    [class*="SearchContainer"],
    [class*="InputContainer"] {
      background: var(--bg) !important;
      border-color: var(--border) !important;
    }
    [class*="SearchContainer"] input,
    [class*="InputContainer"] input {
      background: var(--bg) !important;
      color: var(--text) !important;
    }

    /* Entry editor / content panels */
    [class*="EditorInterface"],
    [class*="EntryEditor"],
    [class*="EditorContainer"] {
      background: var(--bg) !important;
    }

    /* Cards (sidebar nav items, collection entries) */
    [class*="-card-"] {
      background: var(--bg2) !important;
      border-color: var(--border) !important;
    }

    /* Login / auth page */
    [class*="AuthenticationPage"],
    [class*="LoginButton"] {
      background: var(--bg) !important;
    }

    /* Catch-all: force dark bg on remaining white panels */
    #nc-root div[style*="background-color: rgb(255"],
    #nc-root div[style*="background: rgb(255"],
    #nc-root div[style*="background: white"],
    #nc-root div[style*="background-color: white"] {
      background: var(--bg2) !important;
    }

    /* Red side borders on CMS container */
    #nc-root > * {
      border-left: 3px solid var(--red-dim);
      border-right: 3px solid var(--red-dim);
    }
  </style>
  <!-- Decap CMS loaded from CDN — no build step required -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js" defer></script>
</head>
<body>

  <div id="admin-banner">
    <span id="admin-banner-label">Admin Mode</span>
    <span id="admin-banner-sub">Central Data Agency · Entity Registry CMS</span>
    <a id="admin-banner-back" href="../">← Registry</a>
  </div>

  <div id="nc-root"></div>
  <!--
    Decap CMS mounts itself here automatically.
    Configuration is read from config.yml in the same directory.

    SETUP REQUIRED:
    1. Register a GitHub OAuth App at https://github.com/settings/developers
       - Homepage URL: https://<org>.github.io/central_data_agency
       - Callback URL: https://api.netlify.com/auth/done  (or your own proxy)
    2. Deploy an OAuth proxy — options:
       - Netlify (free): connect the repo, set OAUTH_CLIENT_ID and OAUTH_CLIENT_SECRET env vars
       - Cloudflare Workers: https://github.com/sveltia/sveltia-cms-auth
       - Vercel: https://github.com/stereobooster/github-oauth-proxy
    3. Update the backend.base_url in config.yml to point to your deployed proxy.

    LOCAL DEVELOPMENT:
    Run: npx decap-server  (in the repo root)
    Then open this file via a local server (e.g. python3 -m http.server from repo root).
    Set backend.name to 'proxy' in config.yml for local dev.
  -->
</body>
</html>
