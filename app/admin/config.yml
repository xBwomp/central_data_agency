# Decap CMS configuration
# Docs: https://decapcms.org/docs/configuration-options/
#
# NOTE ON YAML LIST FILES:
# Our data files are top-level YAML lists. Decap CMS's `file` collection type
# expects an object at the top level. Each data file is therefore modelled as a
# single `file` collection entry with a top-level `list` widget.
#
# The generated file will be:
#   - official: ...
#     variants: [...]
#   - official: ...
#     ...
#
# If the CMS writes a wrapper key (e.g. `entries:`), the build script and any
# existing tooling will need updating. Watch for this and adjust as needed.
#
# ALTERNATIVE: Use a `folder` collection (one file per entry) if you prefer
# a simpler CMS setup — requires restructuring data/ to use subdirectories.

backend:
  name: github
  repo: <YOUR_ORG>/<YOUR_REPO>        # e.g. acme/central_data_agency
  branch: main
  base_url: https://<YOUR_OAUTH_PROXY> # e.g. https://your-proxy.netlify.app
  # For direct commits to main (recommended for small trusted teams):
  # squash_merges: false
  # For PR-based workflow (safer, gets auto-reviewed by claude-code-review.yml):
  # use_graphql: true

# Uncomment to allow editorial workflow (draft → review → publish via PRs):
# publish_mode: editorial_workflow

media_folder: ""   # no media uploads needed for this data-only CMS

collections:
  - name: military_services
    label: Military Services
    description: The six branches of the US Military
    files:
      - name: military_services_data
        label: Military Services entries
        file: data/military_services.yml
        # Decap CMS represents the top-level list via a single `list` widget.
        # The widget key below MUST match what the YAML file contains.
        # If the file is a bare list (no wrapper key), use the list widget at
        # the top-level `fields` array as shown here.
        fields:
          - name: entries
            label: Entries
            widget: list
            label_singular: Entry
            summary: "{{fields.official}}"
            fields:
              - name: official
                label: Official Name
                widget: string
                required: true
                hint: "Canonical full name (required)"
              - name: abbreviation
                label: Abbreviation
                widget: string
                required: false
                hint: "Shortest standard acronym or code (optional)"
              - name: description
                label: Description
                widget: string
                required: false
                hint: "One-sentence plain-English description (optional)"
              - name: tags
                label: Tags
                widget: list
                required: false
                hint: "Lowercase labels for grouping/filtering (optional)"
              - name: variants
                label: Variants
                widget: list
                required: true
                hint: "All other acceptable names, spellings, aliases (required, min 1)"

  # ── Template for adding new collections ──────────────────────────────────
  # Copy this block, update name/label/description/file, and repeat the fields.
  #
  # - name: federal_agencies
  #   label: Federal Agencies
  #   description: US federal agencies and departments
  #   files:
  #     - name: federal_agencies_data
  #       label: Federal Agencies entries
  #       file: data/federal_agencies.yml
  #       fields:
  #         - name: entries
  #           label: Entries
  #           widget: list
  #           label_singular: Entry
  #           summary: "{{fields.official}}"
  #           fields:
  #             - { name: official,      label: Official Name,  widget: string, required: true }
  #             - { name: abbreviation,  label: Abbreviation,   widget: string }
  #             - { name: description,   label: Description,    widget: string }
  #             - { name: tags,          label: Tags,           widget: list }
  #             - { name: variants,      label: Variants,       widget: list, required: true }
