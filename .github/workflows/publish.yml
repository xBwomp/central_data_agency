name: Build & Publish to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'app/**'
      - 'scripts/build_api.py'
  workflow_dispatch:   # allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; cancel in-progress runs on new push.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Build JSON API from YAML data
        run: python3 scripts/build_api.py

      - name: Assemble site
        run: |
          # Copy browse UI into dist/
          cp -r app/. dist/
          # The JSON API is already in dist/api/ from the build script.
          # dist/ structure:
          #   index.html       ← browse UI
          #   browse.js
          #   admin/
          #     index.html     ← Decap CMS
          #     config.yml
          #   api/
          #     index.json
          #     military_services.json
          #     ...

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
